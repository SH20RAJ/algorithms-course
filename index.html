<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithms Mastery | Abdul Bari Course</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>AlgoMaster</span>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="video-search" placeholder="Search topics...">
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-info">
                    <span>Course Progress</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-bar-fill" id="progress-bar-fill"></div>
                </div>
                <div class="progress-stats">
                    <span id="completed-count">0</span> of <span id="total-count">0</span> videos
                </div>
            </div>

            <div id="chapters-container" class="chapters-list">
                <!-- Chapters will be injected here -->
            </div>

            <div class="sidebar-footer">
                <a href="https://github.com/SH20RAJ/algorithms-course" target="_blank" class="footer-link">
                    <i class="fab fa-github"></i> GitHub Repo
                </a>
                <div class="visitor-badge">
                    <img src="https://visitor-badge.laobi.icu/badge?page_id=algorithms-course.pages.dev" alt="Visitors">
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="video-player-container">
                <div class="video-aspect-ratio">
                    <div id="player"></div>
                </div>
                <div class="video-info">
                    <div class="info-header">
                        <h1 id="video-title" class="current-title">Select a video to start</h1>
                        <button id="mark-complete-btn" class="btn btn-primary">
                            <i class="far fa-check-circle"></i> Mark as Complete
                        </button>
                    </div>
                </div>
            </div>

            <div class="content-tabs">
                <div class="tab-header">
                    <button class="tab-btn active" data-tab="curriculum">Curriculum</button>
                    <button class="tab-btn" data-tab="completion">Completion</button>
                        <h2>Course Completion</h2>
                        <p>Track your journey through the algorithms course.</p>
                        <div class="stats">
                            <div class="stat">
                                <span id="completed-count">0</span>
                                <label>Completed</label>
                            </div>
                            <div class="stat">
                                <span id="total-count">0</span>
                                <label>Total</label>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
