<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithms Mastery | Abdul Bari Course</title>
    <meta name="description" content="Master Algorithms with Abdul Bari's course. Interactive video platform with progress tracking, chapters, and completion rewards.">
    <meta name="author" content="sh20raj">
    <meta property="og:title" content="Algorithms Mastery Platform">
    <meta property="og:description" content="Interactive Algorithms course platform with Abdul Bari.">
    <meta property="og:url" content="https://algorithms-course.pages.dev/">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>AlgoMaster</span>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="video-search" placeholder="Search topics...">
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-info">
                    <span>Course Progress</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-bar-fill" id="progress-bar-fill"></div>
                </div>
                <div class="progress-stats">
                    <span id="completed-count">0</span> of <span id="total-count">0</span> videos
                </div>
            </div>

            <div id="chapters-container" class="chapters-list">
                <!-- Chapters will be injected here -->
            </div>

            <div class="sidebar-footer">
                <a href="https://github.com/SH20RAJ/algorithms-course" target="_blank" class="footer-link">
                    <i class="fab fa-github"></i> GitHub Repo
                </a>
                <div class="visitor-badge">
                    <img src="https://visitor-badge.laobi.icu/badge?page_id=algorithms-course.pages.dev" alt="Visitors">
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="video-player-container">
                <div class="video-aspect-ratio">
                    <div id="player"></div>
                </div>
                <div class="video-info">
                    <div class="info-header">
                        <h1 id="video-title" class="current-title">Select a video to start</h1>
                        <div class="video-controls">
                            <button id="prev-video-btn" class="btn btn-secondary" title="Previous Video">
                                <i class="fas fa-step-backward"></i>
                            </button>
                            <button id="mark-complete-btn" class="btn btn-primary">
                                <i class="far fa-check-circle"></i> Mark as Complete
                            </button>
                            <button id="next-video-btn" class="btn btn-secondary" title="Next Video">
                                <i class="fas fa-step-forward"></i>
                            </button>
                            <button id="speed-toggle-btn" class="btn btn-secondary speed-btn" title="Toggle Playback Speed">
                                1x
                            </button>
                        </div>
                    </div>
                    <div class="info-footer">
                        <label class="auto-play-toggle">
                            <input type="checkbox" id="autoplay-toggle" checked>
                            <span class="slider"></span>
                            <span class="label-text">Autoplay Next</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="content-tabs">
                <div class="tab-header">
                    <button class="tab-btn active" data-tab="curriculum">Curriculum</button>
                    <button class="tab-btn" data-tab="completion">Completion</button>
                    <button class="tab-btn" data-tab="resources">Resources</button>
                </div>
                <div class="tab-body">
                    <div id="curriculum-tab" class="tab-content">
                        <div class="curriculum-grid" id="curriculum-overview">
                            <!-- Populated via JS -->
                        </div>
                    </div>
                    <div id="completion-tab" class="tab-content hidden">
                        <div class="completion-card">
                            <div class="celebration-header">
                                <i class="fas fa-trophy"></i>
                                <h2>Your Journey to Mastery</h2>
                                <p>Track your chapter-wise completion here.</p>
                            </div>
                            <div id="completion-checklist" class="completion-checklist">
                                <!-- Chapter checkboxes will be injected here -->
                            </div>
                        </div>
                    </div>
                    <div id="resources-tab" class="tab-content hidden">
                        <div class="resources-grid">
                            <a href="https://www.youtube.com/playlist?list=PLDN4rrl48XKpZkf03iYFl-O29szjTrs_O" target="_blank" class="resource-item">
                                <i class="fab fa-youtube"></i>
                                <span>Original Playlist</span>
                            </a>
                            <a href="https://github.com/SH20RAJ/algorithms-course" target="_blank" class="resource-item">
                                <i class="fab fa-github"></i>
                                <span>Source Code</span>
                            </a>
                            <a href="https://twitter.com/sh20raj" target="_blank" class="resource-item">
                                <i class="fab fa-twitter"></i>
                                <span>Follow @sh20raj</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
